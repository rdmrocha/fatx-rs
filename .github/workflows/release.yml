name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Gate: all checks must pass before building release artifacts ──
  format:
    name: Format Check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint (Clippy)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  security:
    name: Security Audit
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  test:
    name: Test Suite
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-

      - name: Run tests
        run: cargo test --workspace

  # ── Build release binaries (depends on all checks passing) ──
  build:
    needs: [format, lint, security, test]
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            name: xtafkit-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            name: xtafkit-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}"
            echo "Normalized 4+-segment tag version to Cargo semver: $VERSION"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag version '$VERSION' is not a valid Cargo semver-compatible version."
            exit 1
          fi
          echo "Setting version to $VERSION"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" fatxlib/Cargo.toml
          cargo metadata --no-deps --format-version=1 >/dev/null

      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz xtafkit
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  # ── Create GitHub Release with all artifacts ──
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Pull just the section matching this tag's version out of CHANGELOG.md.
      # If a matching section isn't found we leave release_notes.md empty,
      # which lets `generate_release_notes` fall back to GitHub's auto notes.
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting notes for version $VERSION from CHANGELOG.md"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if (index($0, "[" ver "]")) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          if [ -s release_notes.md ]; then
            echo "Found $(wc -l < release_notes.md) lines of release notes."
          else
            echo "No matching section for $VERSION; release will use auto-generated notes only."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body_path: release_notes.md
          files: |
            artifacts/**/*.tar.gz
